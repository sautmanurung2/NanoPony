name: Version Tag on Changes

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  version-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for recent activity
        id: check-activity
        run: |
          # Check for commits in the last 24 hours
          COMMIT_COUNT=$(git log --oneline --since="24 hours ago" | wc -l)
          
          # Check for merged pull requests in the last 24 hours
          PR_MERGED=$(git log --oneline --since="24 hours ago" --merges | grep -i "merge pull request" | wc -l || echo "0")

          TOTAL_ACTIVITY=$((COMMIT_COUNT + PR_MERGED))

          echo "Commit count: $COMMIT_COUNT"
          echo "Merged PRs: $PR_MERGED"
          echo "Total activity: $TOTAL_ACTIVITY"
          
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "pr_merged=$PR_MERGED" >> $GITHUB_OUTPUT

          if [ "$TOTAL_ACTIVITY" -eq 0 ]; then
            echo "No new commits or merged pull requests in the last 24 hours. Skipping tag creation."
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "New activity found. Creating tag."
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump-version
        if: steps.check-activity.outputs.should_tag == 'true'
        run: |
          # Read current version
          CURRENT_VERSION=$(cat VERSION)
          echo "Current version: $CURRENT_VERSION"

          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Bump patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > VERSION

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.check-activity.outputs.should_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push version bump
        if: steps.check-activity.outputs.should_tag == 'true'
        run: |
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump-version.outputs.new_version }} [skip ci]"
          git push origin main

      - name: Generate changelog
        if: steps.check-activity.outputs.should_tag == 'true'
        run: |
          # Get the last tag if it exists, otherwise get all commits
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline)
          else
            COMMITS=$(git log --oneline)
          fi
          
          # Generate detailed changelog
          CHANGELOG=""
          CHANGELOG+="## 📝 Changes in v${{ steps.bump-version.outputs.new_version }}"$'\n\n'
          CHANGELOG+="Commits since ${LAST_TAG:-$([ -n "$COMMITS" ] && git log --oneline | tail -1 | cut -d' ' -f1 || 'initial commit')}"$'\n\n'
          
          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "^(feat|feature|add|new)" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^(fix|bug|patch|hotfix)" || true)
          IMPROVEMENTS=$(echo "$COMMITS" | grep -iE "^(improve|update|enhance|refactor|optimize)" || true)
          DOCS=$(echo "$COMMITS" | grep -iE "^(doc|docs|readme|documentation)" || true)
          OTHER=$(echo "$COMMITS" | grep -viE "^(feat|feature|add|new|fix|bug|patch|hotfix|improve|update|enhance|refactor|optimize|doc|docs|readme|documentation|chore|ci|test)" || true)
          
          if [ -n "$FEATURES" ]; then
            CHANGELOG+="### ✨ New Features"$'\n'
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG+="- $line"$'\n'
            done <<< "$FEATURES"
            CHANGELOG+=$'\n'
          fi
          
          if [ -n "$FIXES" ]; then
            CHANGELOG+="### 🐛 Bug Fixes"$'\n'
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG+="- $line"$'\n'
            done <<< "$FIXES"
            CHANGELOG+=$'\n'
          fi
          
          if [ -n "$IMPROVEMENTS" ]; then
            CHANGELOG+="### 🚀 Improvements"$'\n'
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG+="- $line"$'\n'
            done <<< "$IMPROVEMENTS"
            CHANGELOG+=$'\n'
          fi
          
          if [ -n "$DOCS" ]; then
            CHANGELOG+="### 📚 Documentation"$'\n'
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG+="- $line"$'\n'
            done <<< "$DOCS"
            CHANGELOG+=$'\n'
          fi
          
          if [ -n "$OTHER" ]; then
            CHANGELOG+="### 🔧 Other Changes"$'\n'
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG+="- $line"$'\n'
            done <<< "$OTHER"
            CHANGELOG+=$'\n'
          fi
          
          # Summary stats
          TOTAL_COMMITS=$(echo "$COMMITS" | grep -c . || echo "0")
          FILES_CHANGED=$(git diff --stat "$LAST_TAG" HEAD 2>/dev/null | tail -1 || echo "N/A")
          
          CHANGELOG+="### 📊 Summary"$'\n'
          CHANGELOG+="- Total commits: $TOTAL_COMMITS"$'\n'
          CHANGELOG+="- Files changed: $FILES_CHANGED"$'\n'
          
          # Save changelog to file for later use
          echo "$CHANGELOG" > CHANGELOG.md

      - name: Create Git tag
        if: steps.check-activity.outputs.should_tag == 'true'
        run: |
          git tag -a "v${{ steps.bump-version.outputs.new_version }}" -f -m "$(cat CHANGELOG.md)"
          git push origin "v${{ steps.bump-version.outputs.new_version }}" -f

      - name: Create GitHub Release
        if: steps.check-activity.outputs.should_tag == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const newVersion = '${{ steps.bump-version.outputs.new_version }}';
            const currentVersion = '${{ steps.bump-version.outputs.current_version }}';
            
            // Read changelog from file
            let changelog = '';
            try {
              changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            } catch (e) {
              changelog = `Automated version bump from v${currentVersion} to v${newVersion}`;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${newVersion}`,
              name: `Release v${newVersion}`,
              body: changelog,
              generate_release_notes: false
            });
