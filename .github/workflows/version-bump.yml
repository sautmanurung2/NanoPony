name: Auto Release (Safe for Go Modules)

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Get commits since last tag
        id: commits
        run: |
          COMMITS=$(git log ${{ steps.get_tag.outputs.last_tag }}..HEAD --oneline)
          echo "$COMMITS"

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          LAST=${{ steps.get_tag.outputs.last_tag }}
          VERSION=${LAST#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          COMMITS="${{ steps.commits.outputs.commits }}"

          if echo "$COMMITS" | grep -qiE "BREAKING|feat!"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=${{ steps.get_tag.outputs.last_tag }}
          COMMITS=$(git log $LAST_TAG..HEAD --oneline)

          CHANGELOG="## 🚀 Release ${{ steps.bump.outputs.new_version }}\n\n"

          echo "$COMMITS" | while read line; do
            CHANGELOG+="- $line\n"
          done

          echo -e "$CHANGELOG" > CHANGELOG.md

      # 🔥 INI YANG PALING PENTING
      # TAG dibuat langsung di commit HEAD (yang ada perubahan)
      - name: Create tag
        run: |
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin ${{ steps.bump.outputs.new_version }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('CHANGELOG.md', 'utf8');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.bump.outputs.new_version }}',
              name: 'Release ${{ steps.bump.outputs.new_version }}',
              body: body
            });