name: Auto Release (Safe for Go Modules)

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.content }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Format Go code
        run: gofmt -s -w .

      - name: Run Unit Tests
        id: unit_tests
        run: |
          go test -v -race ./... > unit-tests.log 2>&1
          cat unit-tests.log

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: unit-tests.log

      - name: Generate Step Summary
        if: always()
        run: |
          echo "### 🧪 Unit Test Results Summary" >> $GITHUB_STEP_SUMMARY
          
          if grep -q "FAIL" unit-tests.log; then
            echo "❌ **Unit Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Unit Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>🔍 View Unit Test Logs</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          cat unit-tests.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Get latest tag
        id: get_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Get commits since last tag
        id: commits
        run: |
          COMMITS=$(git log ${{ steps.get_tag.outputs.last_tag }}..HEAD --oneline)
          echo "$COMMITS"

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          LAST=${{ steps.get_tag.outputs.last_tag }}
          VERSION=${LAST#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          COMMITS="${{ steps.commits.outputs.commits }}"

          if [ -z "$COMMITS" ]; then
            NEW_VERSION="$LAST"
          elif echo "$COMMITS" | grep -qiE "BREAKING|feat!"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          else
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release needed
        id: check
        run: |
          if [ "${{ steps.get_tag.outputs.last_tag }}" != "${{ steps.bump.outputs.new_version }}" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=${{ steps.get_tag.outputs.last_tag }}
          COMMITS=$(git log $LAST_TAG..HEAD --oneline)

          CHANGELOG="## 🚀 Release ${{ steps.bump.outputs.new_version }}\n\n"

          echo "$COMMITS" | while read line; do
            CHANGELOG+="- $line\n"
          done

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  tag_and_release:
    needs: calculate
    if: needs.calculate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag ${{ needs.calculate.outputs.new_version }}
          git push origin ${{ needs.calculate.outputs.new_version }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.calculate.outputs.changelog }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = process.env.RELEASE_BODY;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ needs.calculate.outputs.new_version }}',
              name: 'Release ${{ needs.calculate.outputs.new_version }}',
              body: body
            });