name: Weekly Version Bump

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for commits in the last week
        id: check-commits
        run: |
          # Get commits from the last 7 days
          SINCE_DATE=$(date -d '7 days ago' --iso-8601=seconds)
          COMMIT_COUNT=$(git log --oneline --since="$SINCE_DATE" | wc -l)
          
          echo "Commit count: $COMMIT_COUNT"
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No new commits in the last week. Skipping version bump."
            echo "should_bump=false" >> $GITHUB_OUTPUT
          else
            echo "New commits found. Bumping version."
            echo "should_bump=true" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump-version
        if: steps.check-commits.outputs.should_bump == 'true'
        run: |
          # Read current version
          CURRENT_VERSION=$(cat VERSION)
          echo "Current version: $CURRENT_VERSION"
          
          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          # Bump patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > VERSION
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.check-commits.outputs.should_bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push version bump
        if: steps.check-commits.outputs.should_bump == 'true'
        run: |
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump-version.outputs.new_version }} [skip ci]"
          git push origin main

      - name: Create Git tag
        if: steps.check-commits.outputs.should_bump == 'true'
        run: |
          git tag -a "v${{ steps.bump-version.outputs.new_version }}" -m "Release v${{ steps.bump-version.outputs.new_version }}"
          git push origin "v${{ steps.bump-version.outputs.new_version }}"

      - name: Create GitHub Release
        if: steps.check-commits.outputs.should_bump == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const newVersion = '${{ steps.bump-version.outputs.new_version }}';
            const currentVersion = '${{ steps.bump-version.outputs.current_version }}';
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${newVersion}`,
              name: `Release v${newVersion}`,
              body: `Automated weekly version bump from v${currentVersion} to v${newVersion}`,
              generate_release_notes: true
            });
